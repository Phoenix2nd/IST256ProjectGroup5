<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Order History</title>

  <link rel="stylesheet" href="css/styles.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    .badge-pending { background-color: #ca8a04; color: #fff; }
    .badge-approved { background-color: #16a34a; color: #fff; }
    .badge-declined { background-color: #dc2626; color: #fff; }

    .stat-card {
      background-color: #0f172a;
      border: 1px solid #1e3a5f;
      border-radius: 8px;
      padding: 20px;
      text-align: center;
    }

    .stat-number {
      font-size: 2rem;
      font-weight: bold;
      color: #3b82f6;
      display: block;
    }

    .stat-label {
      font-size: 0.85rem;
      color: #9ca3af;
    }

    .order-table thead th {
      background-color: #1e3a6e;
      color: #93c5fd;
      font-weight: bold;
    }

    .order-table td {
      vertical-align: middle;
    }

    .session-pill {
      display: inline-block;
      background-color: #1e3a5f;
      color: #93c5fd;
      font-size: 0.75rem;
      padding: 2px 8px;
      border-radius: 20px;
      margin: 2px;
    }

    .filter-bar {
      background-color: #f4f7ff;
      border: 1px solid #dbe4ff;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 24px;
    }
  </style>
</head>

<body>

<header class="container-fluid py-3">
  <div class="container d-flex justify-content-between align-items-center">
    <div>
      <a href="index.html"><strong>Conference 2026</strong></a>
    </div>
    <nav>
      <ul class="nav gap-3">
        <li><a href="index.html">Home</a></li>
        <li><a href="register.html">Register</a></li>
        <li><a href="catalog.html">Catalog</a></li>
        <li><a href="store.html">Store</a></li>
        <li><a href="approval.html">Approval</a></li>
      </ul>
    </nav>
  </div>
</header>

<main id="main-content" class="container my-4">

  <section class="mb-4">
    <div class="d-flex justify-content-between align-items-start flex-wrap gap-2">
      <div>
        <h1 class="mb-1">Order History</h1>
        <p class="mb-0">All session registration submissions and their current approval status.</p>
      </div>
      <div class="d-flex gap-2 flex-wrap">
        <a href="FinalizationPage.html" class="btn btn-primary btn-sm fw-bold">+ New Registration</a>
        <a href="approval.html" class="btn btn-warning btn-sm fw-bold text-dark">Admin Approval Panel</a>
      </div>
    </div>
  </section>

  <div class="row g-3 mb-4">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <span id="total-count" class="stat-number">0</span>
        <span class="stat-label">Total Submissions</span>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <span id="approved-count" class="stat-number" style="color:#16a34a;">0</span>
        <span class="stat-label">Approved</span>
      </div>
