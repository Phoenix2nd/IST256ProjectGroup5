<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finalization – Conference 2026</title>

  <!-- Existing CSS -->
  <link rel="stylesheet" href="css/styles.css"/>

  <!-- Bootstrap added -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="container py-3">
  <h1>Conference 2026 – Finalization</h1>
</header>

<!-- Bootstrap container added -->
<main id="main-content" class="container my-4">

  <!-- REGISTRATION FORM -->
  <section>
    <h2>Attendee Information</h2>

    <form id="finalization-form">

      <label>Full Name *</label>
      <input type="text" id="full-name" required />

      <label>Email *</label>
      <input type="email" id="email" required />

      <label>Institution *</label>
      <input type="text" id="institution" required />

      <label>Attendee Type *</label>
      <select id="attendee-type" required>
        <option value="">Select</option>
        <option>Student</option>
        <option>Academic</option>
        <option>Industry</option>
      </select>

      <h3 class="mt-3">Participation Type</h3>
      <label><input type="radio" name="participation_type" value="in-person" required> In-person</label>
      <label><input type="radio" name="participation_type" value="virtual"> Virtual</label>

      <h3 class="mt-3">Select Sessions</h3>
      <label><input type="checkbox" name="sessions" value="AI Workshop"> AI Workshop</label>
      <label><input type="checkbox" name="sessions" value="Data Science Panel"> Data Science Panel</label>
      <label><input type="checkbox" name="sessions" value="Networking Event"> Networking Event</label>

      <br><br>

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </section>

  <!-- ORDER SUMMARY -->
  <section>
    <h2>Order Summary</h2>

    <table id="confirmation-summary">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="checkout-summary-table-body"></tbody>
      <tfoot>
        <tr><td colspan="2">Subtotal</td><td></td></tr>
        <tr><td colspan="2">Tax</td><td></td></tr>
        <tr><td colspan="2"><strong>Total</strong></td><td></td></tr>
      </tfoot>
    </table>
  </section>

</main>

<footer class="container py-3">
  <p>© Conference 2026</p>
</footer>

<!-- React ROOT -->
<div id="react-finalization-root" class="container my-4"></div>

<!-- ========================= -->
<!-- SCRIPTS -->
<!-- ========================= -->

<!-- Bootstrap -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

<!-- React -->
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ========================= -->
<!-- REACT CODE INLINE -->
<!-- ========================= -->
<script type="text/babel">

const { useState, useEffect } = React;

function FinalizationApp() {
  const [attendees, setAttendees] = useState([]);
  const [cartItems, setCartItems] = useState([]);
  const [message, setMessage] = useState("");
  const [jsonPreview, setJsonPreview] = useState("");

  useEffect(() => {
    const storedAttendees = JSON.parse(localStorage.getItem("attendees")) || [];
    const storedCart = JSON.parse(localStorage.getItem("conferenceCart")) || [];

    setAttendees(storedAttendees);
    setCartItems(storedCart);

    // Auto Bootstrap styling
    document.querySelectorAll("section").forEach(section => {
      section.classList.add("card", "shadow-sm", "p-3", "mb-4");
    });

    document.querySelectorAll("input, select").forEach(el => {
      if (el.type !== "checkbox" && el.type !== "radio") {
        el.classList.add("form-control", "mb-2");
      } else {
        el.classList.add("form-check-input", "me-2");
      }
    });

    document.querySelectorAll("button[type='submit']").forEach(btn => {
      btn.classList.add("btn", "btn-primary", "me-2");
    });

    document.querySelectorAll("button[type='reset']").forEach(btn => {
      btn.classList.add("btn", "btn-outline-secondary");
    });

    document.getElementById("confirmation-summary")?.classList.add("table", "table-bordered", "mt-3");
  }, []);

  function buildPayload() {
    return {
      attendee: {
        full_name: document.getElementById("full-name").value,
        email: document.getElementById("email").value,
        institution: document.getElementById("institution").value,
        attendee_type: document.getElementById("attendee-type").value
      },
      participation_type:
        document.querySelector("input[name='participation_type']:checked")?.value || "",
      sessions:
        Array.from(document.querySelectorAll("input[name='sessions']:checked"))
          .map(x => x.value),
      attendees_from_localStorage: attendees,
      cart_from_localStorage: cartItems,
      submitted_at: new Date().toISOString()
    };
  }

  function handleSubmit() {
    const payload = buildPayload();
    setJsonPreview(JSON.stringify(payload, null, 2));

    fetch("https://jsonplaceholder.typicode.com/posts", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      console.log("SUCCESS:", data);
      setMessage("Submission successful (check console).");
    })
    .catch(() => {
      setMessage("Submission attempted.");
    });
  }

  return (
    <div className="card p-4 shadow-sm">
      <h2>React Finalization Panel</h2>

      <button className="btn btn-success my-3" onClick={handleSubmit}>
        Build JSON + Send AJAX
      </button>

      {message && <div className="alert alert-info">{message}</div>}

      {jsonPreview && (
        <pre className="bg-light p-3 border rounded">
          {jsonPreview}
        </pre>
      )}
    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("react-finalization-root")
).render(<FinalizationApp />);

</script>
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$("#finalization-form").submit(function(e) {
  e.preventDefault();

  const fullName = $("#full-name").val();
  const email = $("#email").val();
  const institution = $("#institution").val();
  const attendeeType = $("#attendee-type").val();

  const participation = $("input[name='participation_type']:checked").val();

  let sessions = [];
  $("input[name='sessions']:checked").each(function() {
    sessions.push($(this).val());
  });

  if (!fullName || !email || !institution || !attendeeType || !participation) {
    alert("Please fill all required fields");
    return;
  }

  const formData = {
    fullName,
    email,
    institution,
    attendeeType,
    participation,
    sessions
  };

  // ✅ JSON output (for screenshot)
  console.log("JSON Data:", JSON.stringify(formData, null, 2));

  // ✅ AJAX call (REQUIRED)
  $.ajax({
    url: "https://jsonplaceholder.typicode.com/posts",
    type: "POST",
    data: JSON.stringify(formData),
    contentType: "application/json",
    success: function(response) {
      alert("Submission successful!");
      console.log("Server Response:", response);
    }
  });

});
</script>
</body>
</html>
