<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finalization – Conference 2026</title>

  <link rel="stylesheet" href="css/styles.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="container py-3">
  <h1>Conference 2026 – Finalization</h1>
</header>

<main id="main-content" class="container my-4">

  <!-- FORM -->
  <section>
    <h2>Attendee Information</h2>

    <form id="finalization-form">

      <label>Full Name *</label>
      <input type="text" id="full-name" required />

      <label>Email *</label>
      <input type="email" id="email" required />

      <label>Institution *</label>
      <input type="text" id="institution" required />

      <label>Attendee Type *</label>
      <select id="attendee-type" required>
        <option value="">Select</option>
        <option>Student</option>
        <option>Academic</option>
        <option>Industry</option>
      </select>

      <h3 class="mt-3">Participation Type</h3>
      <label><input type="radio" name="participation_type" value="in-person" required> In-person</label>
      <label><input type="radio" name="participation_type" value="virtual"> Virtual</label>

      <h3 class="mt-3">Select Sessions</h3>
      <label><input type="checkbox" name="sessions" value="AI Workshop"> AI Workshop</label>
      <label><input type="checkbox" name="sessions" value="Data Science Panel"> Data Science Panel</label>
      <label><input type="checkbox" name="sessions" value="Networking Event"> Networking Event</label>

      <br><br>

      <button type="submit">Submit</button>
      <button type="reset">Reset</button>
    </form>
  </section>

  <!-- SUMMARY -->
  <section>
    <h2>Order Summary</h2>
    <table id="confirmation-summary">
      <thead>
        <tr>
          <th>Item</th>
          <th>Qty</th>
          <th>Price</th>
        </tr>
      </thead>
      <tbody id="checkout-summary-table-body"></tbody>
    </table>
  </section>

</main>

<footer class="container py-3">
  <p>© Conference 2026</p>
</footer>

<!-- React Root -->
<div id="react-finalization-root" class="container my-4"></div>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<!-- ================= REACT ================= -->
<script type="text/babel">

const { useState, useEffect } = React;

function FinalizationApp() {
  const [message, setMessage] = useState("");

  function buildPayload() {
    return {
      attendee: {
        full_name: document.getElementById("full-name").value,
        email: document.getElementById("email").value,
        institution: document.getElementById("institution").value,
        attendee_type: document.getElementById("attendee-type").value
      },
      participation_type:
        document.querySelector("input[name='participation_type']:checked")?.value || "",
      sessions:
        Array.from(document.querySelectorAll("input[name='sessions']:checked"))
          .map(x => x.value),
      submitted_at: new Date().toISOString()
    };
  }

  function handleSubmit() {
    const payload = buildPayload();

    fetch("http://localhost:3000/api/orders", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    })
    .then(res => res.json())
    .then(data => {
      console.log("Saved:", data);
      setMessage("✅ Submitted! Status = Pending");
    })
    .catch(err => {
      console.error(err);
      setMessage("❌ Error submitting");
    });
  }

  return (
    <div className="card p-4 shadow-sm">
      <h2>React Submit (Backend Connected)</h2>
      <button className="btn btn-success" onClick={handleSubmit}>
        Submit with React
      </button>
      {message && <div className="alert alert-info mt-3">{message}</div>}
    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("react-finalization-root")
).render(<FinalizationApp />);

</script>

<!-- ================= JQUERY ================= -->
<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
$("#finalization-form").submit(function(e) {
  e.preventDefault();

  const fullName = $("#full-name").val();
  const email = $("#email").val();
  const institution = $("#institution").val();
  const attendeeType = $("#attendee-type").val();
  const participation = $("input[name='participation_type']:checked").val();

  let sessions = [];
  $("input[name='sessions']:checked").each(function() {
    sessions.push($(this).val());
  });

  if (!fullName || !email || !institution || !attendeeType || !participation) {
    alert("Please fill all required fields");
    return;
  }

  const formData = {
    attendee: {
      full_name: fullName,
      email: email,
      institution: institution,
      attendee_type: attendeeType
    },
    participation_type: participation,
    sessions: sessions,
    submitted_at: new Date().toISOString()
  };

  console.log("JSON:", JSON.stringify(formData, null, 2));

  $.ajax({
    url: "http://localhost:3000/api/orders",
    type: "POST",
    data: JSON.stringify(formData),
    contentType: "application/json",
    success: function(response) {
      alert("✅ Submission successful (Pending)");
      console.log("Response:", response);
    },
    error: function() {
      alert("❌ Error submitting");
    }
  });
});
</script>

</body>
</html>
