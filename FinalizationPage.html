<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Finalization – Conference 2026</title>

  <link rel="stylesheet" href="css/styles.css"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<header class="container py-3">
  <h1>Conference 2026 – Finalization</h1>
</header>

<main class="container my-4">

  <!-- FORM -->
  <section>
    <h2>Attendee Information</h2>

    <form id="finalization-form">

      <label>Full Name *</label>
      <input type="text" id="full-name" class="form-control" required />

      <label class="mt-2">Email *</label>
      <input type="email" id="email" class="form-control" required />

      <label class="mt-2">Institution *</label>
      <input type="text" id="institution" class="form-control" required />

      <label class="mt-2">Attendee Type *</label>
      <select id="attendee-type" class="form-control" required>
        <option value="">Select</option>
        <option>Student</option>
        <option>Academic</option>
        <option>Industry</option>
      </select>

      <h3 class="mt-3">Participation Type</h3>
      <label><input type="radio" name="participation_type" value="in-person" required> In-person</label>
      <label class="ms-3"><input type="radio" name="participation_type" value="virtual"> Virtual</label>

      <h3 class="mt-3">Select Sessions</h3>
      <label><input type="checkbox" name="sessions" value="AI Workshop"> AI Workshop</label>
      <label class="ms-3"><input type="checkbox" name="sessions" value="Data Science Panel"> Data Science Panel</label>
      <label class="ms-3"><input type="checkbox" name="sessions" value="Networking Event"> Networking Event</label>

    </form>
  </section>

  <!-- REACT APP -->
  <div id="react-finalization-root" class="container my-4"></div>

</main>

<footer class="container py-3">
  <p>© Conference 2026</p>
</footer>

<!-- Scripts -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://unpkg.com/react@18/umd/react.development.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

<script type="text/babel">

const { useState } = React;

function FinalizationApp() {
  const [message, setMessage] = useState("");

  function buildPayload() {
    return {
      attendee: {
        full_name: document.getElementById("full-name").value.trim(),
        email: document.getElementById("email").value.trim(),
        institution: document.getElementById("institution").value.trim(),
        attendee_type: document.getElementById("attendee-type").value
      },
      participation_type:
        document.querySelector("input[name='participation_type']:checked")?.value || "",
      sessions:
        Array.from(document.querySelectorAll("input[name='sessions']:checked"))
          .map(x => x.value),
      submitted_at: new Date().toISOString()
    };
  }

  function validate(payload) {
    if (
      !payload.attendee.full_name ||
      !payload.attendee.email ||
      !payload.attendee.institution ||
      !payload.attendee.attendee_type ||
      !payload.participation_type
    ) {
      return false;
    }
    return true;
  }

  async function handleSubmit() {
    const payload = buildPayload();

    if (!validate(payload)) {
      setMessage("❌ Please fill all required fields");
      return;
    }

    try {
      const res = await fetch("http://localhost:3000/api/orders", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });

      if (!res.ok) {
        throw new Error("Server error");
      }

      const data = await res.json();
      console.log("Saved:", data);

      setMessage("✅ Submitted! Status = Pending");
    } catch (err) {
      console.error(err);
      setMessage("❌ Error submitting (check backend/CORS)");
    }
  }

  return (
    <div className="card p-4 shadow-sm">
      <h2>Submit Registration</h2>
      <button
        type="button"
        className="btn btn-success mt-2"
        onClick={handleSubmit}
      >
        Submit
      </button>

      {message && (
        <div className="alert alert-info mt-3">
          {message}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(
  document.getElementById("react-finalization-root")
).render(<FinalizationApp />);

</script>

</body>
</html>
